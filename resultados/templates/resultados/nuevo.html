{% extends 'base.html' %}

{% block content %}

<h3 class="mb-4">Nuevo Resultado Médico</h3>

<div class="card shadow-sm">
<div class="card-body">

<form method="POST">
{% csrf_token %}

<div class="row">

<div class="col-md-6 mb-3">
<label class="fw-bold">Paciente</label>
<select name="paciente" class="form-control" required>
<option value="">Seleccionar paciente</option>
{% for p in pacientes %}
<option value="{{ p.id }}">{{ p.nombre }}</option>
{% endfor %}
</select>
</div>

<div class="col-md-6 mb-3">
<label class="fw-bold">Doctor</label>
<select name="doctor" class="form-control" required>
<option value="">Seleccionar doctor</option>
{% for d in doctores %}
<option value="{{ d.id }}">{{ d.nombre }}</option>
{% endfor %}
</select>
</div>

<div class="col-md-12 mb-3">
<label class="fw-bold">Cita</label>
<select name="cita" class="form-control" required>
<option value="">Seleccionar cita</option>
{% for c in citas %}
<option value="{{ c.id }}">
{{ c.paciente }} - {{ c.fecha }} - {{ c.hora }}
</option>
{% endfor %}
</select>
</div>

<div class="col-md-12 mb-3">
<label class="fw-bold">Diagnóstico</label>
<textarea
name="diagnostico"
class="form-control"
rows="3"
required></textarea>
</div>

<div class="col-md-12 mb-3">
<label class="fw-bold">Observaciones</label>
<textarea
name="observaciones"
class="form-control"
rows="3"></textarea>
</div>

</div>

<div class="d-flex gap-2">

<button class="btn btn-primary">
Guardar
</button>

<a href="/resultados/" class="btn btn-secondary">
Volver
</a>

</div>

</form>

</div>
</div>

{% endblock %}
