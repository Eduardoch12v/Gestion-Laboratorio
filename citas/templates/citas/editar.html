{% extends 'base.html' %}

{% block content %}

<h3 class="mb-4">Editar Cita</h3>

<div class="card shadow-sm">
<div class="card-body">

<form method="POST">
{% csrf_token %}

<div class="row">

<div class="col-md-6 mb-3">
<label>Paciente</label>
<select name="paciente" class="form-control">
{% for p in pacientes %}
<option value="{{ p.id }}"
{% if cita.paciente.id == p.id %}selected{% endif %}>
{{ p.nombre }}
</option>
{% endfor %}
</select>
</div>

<div class="col-md-6 mb-3">
<label>Doctor</label>
<select name="doctor" class="form-control">
{% for d in doctores %}
<option value="{{ d.id }}"
{% if cita.doctor.id == d.id %}selected{% endif %}>
{{ d.nombre }}
</option>
{% endfor %}
</select>
</div>

<div class="col-md-6 mb-3">
<label>Fecha</label>
<input 
type="date"
name="fecha"
class="form-control"
value="{{ cita.fecha|date:'Y-m-d' }}">
</div>

<div class="col-md-6 mb-3">
<label>Hora</label>
<input 
type="time"
name="hora"
class="form-control"
value="{{ cita.hora|time:'H:i' }}">
</div>

<div class="col-12 mb-3">
<label>Motivo</label>
<input 
type="text"
name="motivo"
class="form-control"
value="{{ cita.motivo }}">
</div>

<div class="col-md-6 mb-3">
<label>Estado</label>
<select name="estado" class="form-control">

<option value="Pendiente" {% if cita.estado == "Pendiente" %}selected{% endif %}>
Pendiente
</option>

<option value="Confirmada" {% if cita.estado == "Confirmada" %}selected{% endif %}>
Confirmada
</option>

<option value="Cancelada" {% if cita.estado == "Cancelada" %}selected{% endif %}>
Cancelada
</option>

<option value="Atendida" {% if cita.estado == "Atendida" %}selected{% endif %}>
Atendida
</option>

</select>
</div>

</div>

<button class="btn btn-primary">
Guardar
</button>

<a href="/citas/" class="btn btn-secondary">
Volver
</a>

</form>

</div>
</div>

{% endblock %}
