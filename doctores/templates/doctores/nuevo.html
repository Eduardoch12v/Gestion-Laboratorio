{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
  <h3>Nuevo Doctor</h3>

  <a href="/doctores/" class="btn btn-secondary">
    ← Regresar
  </a>
</div>

<div class="card shadow-sm">
<div class="card-body">

{% if messages %}
  {% for message in messages %}
    <div class="alert alert-danger">
      {{ message }}
    </div>
  {% endfor %}
{% endif %}

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<label class="form-label">Nombre</label>
<input 
  type="text" 
  name="nombre" 
  class="form-control" 
  pattern="[A-Za-zÁÉÍÓÚáéíóúñÑ ]+" 
  title="Solo letras" 
  required>
</div>

<div class="mb-3">
<label class="form-label">Especialidad</label>
<input 
  type="text" 
  name="especialidad" 
  class="form-control" 
  pattern="[A-Za-zÁÉÍÓÚáéíóúñÑ ]+" 
  title="Solo letras" 
  required>
</div>

<div class="mb-3">
<label class="form-label">Telefono</label>
<input 
  type="text" 
  name="telefono" 
  class="form-control" 
  pattern="[0-9]+" 
  title="Solo números">
</div>

<div class="mb-3">
<label class="form-label">Consultorio</label>
<input 
  type="text" 
  name="consultorio" 
  class="form-control" 
  pattern="[A-Za-z0-9]+" 
  title="Ejemplo: A45">
</div>

<button class="btn btn-primary">
Guardar Doctor
</button>

<a href="/doctores/" class="btn btn-outline-secondary">
Cancelar
</a>

</form>

</div>
</div>

{% endblock %}
