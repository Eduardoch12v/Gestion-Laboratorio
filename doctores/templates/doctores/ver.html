{% extends 'base.html' %}
{% block content %}

<h3 class="mb-4">Perfil del Doctor</h3>

<div class="card shadow-sm">
  <div class="card-body">
    <div class="row">

      <div class="col-md-6 mb-3">
        <label class="fw-bold">Nombre</label>
        <div>{{ doctor.nombre }}</div>
      </div>

      <div class="col-md-6 mb-3">
        <label class="fw-bold">Especialidad</label>
        <div>{{ doctor.especialidad }}</div>
      </div>

      <div class="col-md-6 mb-3">
        <label class="fw-bold">Telefono</label>
        <div>{{ doctor.telefono }}</div>
      </div>

      <div class="col-md-6 mb-3">
        <label class="fw-bold">Consultorio</label>
        <div>{{ doctor.consultorio }}</div>
      </div>

      <div class="col-md-6 mb-3">
        <label class="fw-bold">Estado</label>
        <div>Activo</div>
      </div>

    </div>
    <hr>

    <div class="d-flex gap-2">
      <a href="/doctores/editar/{{ doctor.id }}/"
         class="btn btn-warning">
        Editar
      </a>

      <button
        class="btn btn-danger"
        id="btn-eliminar"
        data-id="{{ doctor.id }}">
        Eliminar
      </button>

      <a href="/doctores/"
         class="btn btn-secondary">
        Volver
      </a>
    </div>

  </div>
</div>

<script>
  document.getElementById('btn-eliminar').addEventListener('click', function () {
    var id = this.getAttribute('data-id');
    if (confirm("¿Seguro que deseas eliminar este doctor? Esta acción no se puede deshacer.")) {
      window.location.href = "/doctores/eliminar/" + id + "/";
    }
  });
</script>

{% endblock %}
