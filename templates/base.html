<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Clínica</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

body{
background:#f5f7fb;
}

/* SIDEBAR */

.sidebar{
width:240px;
height:100vh;
position:fixed;
background:linear-gradient(180deg,#0d6efd,#0a58ca);
color:white;
transition:.3s;
}

.sidebar h4{
padding:20px;
font-weight:600;
}

.sidebar a{
display:block;
color:white;
padding:12px 20px;
text-decoration:none;
transition:.2s;
border-left:4px solid transparent;
}

.sidebar a:hover{
background:rgba(255,255,255,.1);
padding-left:25px;
}

.sidebar a.active{
background:rgba(255,255,255,.15);
border-left:4px solid white;
}

.sidebar i{
width:22px;
}

/* CONTENT */

.content{
margin-left:240px;
padding:25px;
transition:.3s;
}

/* BADGE */

.badge-menu{
float:right;
background:white;
color:#0d6efd;
}

/* MOBILE */

@media(max-width:768px){

.sidebar{
margin-left:-240px;
}

.sidebar.show{
margin-left:0;
}

.content{
margin-left:0;
}

}

.menu-btn{
display:none;
position:fixed;
top:10px;
left:10px;
z-index:999;
}

@media(max-width:768px){
.menu-btn{
display:block;
}
}

</style>

</head>
<body>

<button class="btn btn-primary menu-btn" onclick="toggleMenu()">
<i class="fas fa-bars"></i>
</button>

<div class="sidebar" id="sidebar">

<h4>
<i class="fas fa-hospital"></i> Clínica
</h4>

<a href="/dashboard/" class="{% if request.path == '/dashboard/' %}active{% endif %}">
<i class="fas fa-chart-line"></i>
Dashboard
</a>

<a href="/pacientes/" class="{% if '/pacientes' in request.path %}active{% endif %}">
<i class="fas fa-users"></i>
Pacientes
</a>

<a href="/citas/" class="{% if '/citas' in request.path %}active{% endif %}">
<i class="fas fa-calendar"></i>
Citas

{% if citas_hoy_menu %}
<span class="badge badge-menu">
{{ citas_hoy_menu }}
</span>
{% endif %}

</a>

<a href="/doctores/" class="{% if '/doctores' in request.path %}active{% endif %}">
<i class="fas fa-user-doctor"></i>
Doctores
</a>

<a href="/resultados/" class="{% if '/resultados' in request.path %}active{% endif %}">
<i class="fas fa-file-medical"></i>
Resultados
</a>

<a href="/cambiar-password/" class="{% if '/cambiar-password' in request.path %}active{% endif %}">
<i class="fas fa-user-lock"></i>
Cambiar contraseña
</a>

<a href="/logout/">
<i class="fas fa-right-from-bracket"></i>
Cerrar sesión
</a>

</div>

<div class="content">
{% block content %}
{% endblock %}
</div>

<script>
function toggleMenu(){
document.getElementById("sidebar").classList.toggle("show")
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
