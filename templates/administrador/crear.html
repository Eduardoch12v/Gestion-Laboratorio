{% extends 'base_admin.html' %}

{% block content %}

<h3>Crear Usuario</h3>

<form method="POST">
{% csrf_token %}

<div class="mb-2">
<input name="username"
class="form-control"
placeholder="Usuario">
</div>

<div class="mb-2">
<input name="email"
class="form-control"
placeholder="Correo">
</div>

<div class="mb-2">
<input name="password"
type="password"
class="form-control"
placeholder="Password">
</div>

<div class="mb-2">
<select name="rol" class="form-control">

<option value="Administrador">
Administrador
</option>

<option value="Personal">
Personal
</option>

<option value="Paciente">
Paciente
</option>

</select>
</div>

<button class="btn btn-primary">
Crear usuario
</button>

</form>

{% endblock %}
