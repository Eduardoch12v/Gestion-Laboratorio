<!DOCTYPE html>
<html>
<head>
<title>Login Clínica</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background: linear-gradient(135deg,#0d6efd,#0dcaf0);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
}

.login-box{
background:white;
padding:40px;
border-radius:15px;
width:350px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.login-box h3{
text-align:center;
margin-bottom:20px;
}

.form-control{
border-radius:10px;
}

.btn-login{
width:100%;
border-radius:10px;
}

.logo{
text-align:center;
font-size:40px;
margin-bottom:10px;
}
</style>

</head>
<body>

<div class="login-box">

<div class="logo">
🏥
</div>

<h3>Sistema Clínica</h3>

<form method="post">
{% csrf_token %}

<div class="mb-3">
<input type="text" name="username" class="form-control" placeholder="Usuario">
</div>

<div class="mb-3">
<input type="password" name="password" class="form-control" placeholder="Contraseña">
</div>

<button class="btn btn-primary btn-login">
Ingresar
</button>

</form>

</div>

</body>
</html>
